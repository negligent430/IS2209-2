<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
    <style>
        h1 {
            text-align: center;
        }

        table {
            font-family: arial, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }
        td, th {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }
        tr:nth-child(even) {
            background-color: #dddddd;
        }
    </style>
</head>
<body>
    <h1>Logs</h1>
    <table>
        <tr>
            <th>Session</th>
            <th>Message</th>
            <th>Created At</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td>{{ log.session }}</td>
            <td>{{ log.message }}</td>
            <td>{{ log.created_at }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
