<!DOCTYPE html>
<html>
<head>
   <title>Health</title>
   <style>
       h1 {
           text-align: center;
       }
       table {
           font-family: arial, sans-serif;
           border-collapse: collapse;
           width: 100%;
       }
       td, th {
           border: 1px solid #dddddd;
           text-align: left;
           padding: 8px;
       }
       tr:nth-child(even) {
           background-color: #dddddd;
       }
       .dot {
           height: 12px;
           width: 12px;
           border-radius: 50%;
           display: inline-block;
       }
       .green { background-color: green; }
       .red { background-color: red; }
   </style>
</head>
<body>
   <h1>Health</h1>
   <table>
       <tr>
           <th>Service</th>
           <th>Status</th>
       </tr>
       {% for service, status in health.items() %}
       <tr>
           <td>{{ service }}</td>
           <td>
               <p class="dot {{ 'green' if status == 'Working' else 'red' }}"></p>
                   {{ status }}
           </td>
       </tr>
       {% endfor %}
   </table>
</body>
</html>
